<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated SOC alerts banner">
  <title>SOC Monitoring — Live Alerts</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111a2e"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="radarClip">
      <circle cx="150" cy="130" r="70"/>
    </clipPath>
  </defs>

  <rect width="900" height="260" rx="14" fill="url(#bg)"/>
  <rect x="1" y="1" width="898" height="258" rx="13" fill="none" stroke="#1f2a44" stroke-width="1.5"/>

  <circle cx="150" cy="130" r="95" fill="url(#glow)">
    <animate attributeName="r" values="80;100;80" dur="2.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.6s" repeatCount="indefinite"/>
  </circle>

  <circle cx="150" cy="130" r="70" fill="none" stroke="#28406e" stroke-width="1"/>
  <circle cx="150" cy="130" r="50" fill="none" stroke="#28406e" stroke-width="1"/>
  <circle cx="150" cy="130" r="30" fill="none" stroke="#28406e" stroke-width="1"/>

  <g clip-path="url(#radarClip)">
    <path d="M150 130 L150 60 A70 70 0 0 1 210 95 Z" fill="#3b82f6" opacity="0.35">
      <animateTransform attributeName="transform" type="rotate" from="0 150 130" to="360 150 130" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>

  <g>
    <circle cx="150" cy="130" r="46" fill="#0f1729" stroke="#3b82f6" stroke-width="2">
      <animate attributeName="r" values="44;48;44" dur="2s" repeatCount="indefinite"/>
    </circle>
    <path d="M150 100 L182 112 L182 138 C182 160 168 174 150 182 C132 174 118 160 118 138 L118 112 Z"
          fill="url(#shieldGrad)" stroke="#1e3a8a" stroke-width="1.5">
      <animateTransform attributeName="transform" type="scale" values="1;1.06;1" dur="2s" repeatCount="indefinite" additive="sum"/>
    </path>
    <rect x="139" y="138" width="22" height="18" rx="3" fill="#e6f1fb"/>
    <path d="M143 138 V129 a7 7 0 0 1 14 0 V138" fill="none" stroke="#e6f1fb" stroke-width="4"/>
    <circle cx="150" cy="146" r="3" fill="#1e3a8a"/>
  </g>

  <circle cx="150" cy="130" r="46" fill="none" stroke="#ef4444" stroke-width="2" opacity="0">
    <animate attributeName="r" values="46;80" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0" dur="2.2s" repeatCount="indefinite"/>
  </circle>

  <text x="270" y="70" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="24" font-weight="600" fill="#e5edff">
    SOC Monitoring
  </text>
  <text x="270" y="94" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#8ea2c9">
    Live security alert feed
  </text>

  <line x1="270" y1="108" x2="860" y2="108" stroke="#1f2a44" stroke-width="1"/>

  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13.5">
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.85;1" dur="4.5s" begin="0s" repeatCount="indefinite"/>
      <circle cx="278" cy="130" r="4" fill="#ef4444"/>
      <text x="292" y="134" fill="#f3f4f6">Multiple failed auth attempts</text>
      <text x="700" y="134" fill="#f87171" text-anchor="end">critical</text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.85;1" dur="4.5s" begin="1.1s" repeatCount="indefinite"/>
      <circle cx="278" cy="160" r="4" fill="#f59e0b"/>
      <text x="292" y="164" fill="#f3f4f6">Outbound traffic spike detected</text>
      <text x="700" y="164" fill="#fbbf24" text-anchor="end">high</text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.85;1" dur="4.5s" begin="2.2s" repeatCount="indefinite"/>
      <circle cx="278" cy="190" r="4" fill="#3b82f6"/>
      <text x="292" y="194" fill="#f3f4f6">Firewall rule modified</text>
      <text x="700" y="194" fill="#60a5fa" text-anchor="end">medium</text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.85;1" dur="4.5s" begin="3.3s" repeatCount="indefinite"/>
      <circle cx="278" cy="220" r="4" fill="#10b981"/>
      <text x="292" y="224" fill="#f3f4f6">Threat auto-remediated</text>
      <text x="700" y="224" fill="#34d399" text-anchor="end">resolved</text>
    </g>
  </g>

  <text x="860" y="240" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#4b5b7d" text-anchor="end">
    updated in real time
  </text>
</svg>
