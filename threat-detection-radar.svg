<svg width="100%" height="320" viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="sweepGrad" cx="0%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#39FF14" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#00FF41" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00FF41" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0D2B1A"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="700" height="320" fill="#0D1117"/>

  <text x="350" y="30" text-anchor="middle" font-family="monospace" font-size="14" fill="#39FF14" letter-spacing="2">LIVE THREAT DETECTION // BLUE TEAM MONITORING</text>

  <g transform="translate(180,180)">
    <circle r="130" fill="url(#bgGlow)" stroke="#00FF41" stroke-width="0.75" stroke-opacity="0.5"/>
    <circle r="97" fill="none" stroke="#00FF41" stroke-width="0.5" stroke-opacity="0.35"/>
    <circle r="65" fill="none" stroke="#00FF41" stroke-width="0.5" stroke-opacity="0.35"/>
    <circle r="33" fill="none" stroke="#00FF41" stroke-width="0.5" stroke-opacity="0.35"/>
    <line x1="-130" y1="0" x2="130" y2="0" stroke="#00FF41" stroke-width="0.4" stroke-opacity="0.25"/>
    <line x1="0" y1="-130" x2="0" y2="130" stroke="#00FF41" stroke-width="0.4" stroke-opacity="0.25"/>

    <g>
      <path d="M0,0 L130,0 A130,130 0 0,1 91.9,91.9 Z" fill="url(#sweepGrad)">
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="4s" repeatCount="indefinite"/>
      </path>
    </g>

    <circle cx="45" cy="-60" r="4" fill="#39FF14" filter="url(#softGlow)">
      <animate attributeName="opacity" values="0;1;0" dur="2.6s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-70" cy="20" r="4" fill="#39FF14" filter="url(#softGlow)">
      <animate attributeName="opacity" values="0;1;0" dur="3.1s" begin="1.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="70" r="4" fill="#39FF14" filter="url(#softGlow)">
      <animate attributeName="opacity" values="0;1;0" dur="2.2s" begin="1.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-40" cy="-95" r="4" fill="#39FF14" filter="url(#softGlow)">
      <animate attributeName="opacity" values="0;1;0" dur="3.4s" begin="0.6s" repeatCount="indefinite"/>
    </circle>

    <g transform="translate(0,0)">
      <path d="M0,-14 L12,-8 L12,6 C12,15 6,21 0,24 C-6,21 -12,15 -12,6 L-12,-8 Z" fill="#0D1117" stroke="#00FF41" stroke-width="1.5"/>
      <path d="M-4,3 L-1,7 L6,-4" fill="none" stroke="#39FF14" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <g font-family="monospace" font-size="12" fill="#8fffb0">
    <text x="360" y="90">&gt; scanning network traffic...</text>
    <text x="360" y="112">&gt; correlating log events</text>
    <text x="360" y="134">&gt; cross-referencing MITRE ATT&amp;CK</text>
    <text x="360" y="156">&gt; flagging anomalous behavior</text>

    <rect x="360" y="175" width="150" height="22" rx="3" fill="none" stroke="#00FF41" stroke-opacity="0.5"/>
    <text x="368" y="190" fill="#39FF14">STATUS: MONITORING</text>
    <circle cx="500" cy="186" r="4" fill="#39FF14">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.4s" repeatCount="indefinite"/>
    </circle>

    <text x="360" y="225" fill="#5fd685">ALERTS TRIAGED TODAY</text>
    <text x="360" y="248" font-size="22" fill="#39FF14" font-weight="bold">12</text>

    <text x="480" y="225" fill="#5fd685">MEAN TIME TO DETECT</text>
    <text x="480" y="248" font-size="22" fill="#39FF14" font-weight="bold">4m</text>
  </g>

</svg>
